<div ng-controller="PlayerList" id="PlayerList" class="careermpPlayerList" ng-init="init()" ng-style="{'background-color': 'rgba(0, 0, 0, 0)', 'height': '100%'}">
	<link id="playerlist-style" rel="stylesheet" type="text/css" href="/ui/modules/apps/CareerMP-PlayerList/app.css">
	<div id="main-container">
		<div id="plist-container">
			<table id="players-table">
				<tr>
					<th class="playerslist-col-1" ng-show="showPlayerIDs">ID</th>
					<th class="playerslist-col-2">
						{{:: 'ui.apps.multiplayer.playerlist.players' | translate }}
					</th>
					<th  class="playerslist-col-3">
						<button class="buttons direction-buttons" ng-click="plSwapHorizontal()">🡘</button>
						<button class="buttons direction-buttons" ng-click="plSwapVertical()">🡙</button>
					</th>
				</tr>
				<tr>
					<td>{{:: 'ui.apps.multiplayer.playerlist.error' | translate }}</td>
				</tr>
			</table>
		</div>
		<button class="buttons" id="show-button" onclick="toggleList()">&lt;</button>
	</div>
	<div id="playerlist-contextmenu" style="display: none;">
		<button id="pl-context-Pay1Button">Pay $1</button>
		<button id="pl-context-Pay10Button">Pay $10</button>
		<button id="pl-context-Pay100Button">Pay $100</button>
		<button id="pl-context-Pay1000Button">Pay $1000</button>
		<button id="pl-context-Pay10000Button">Pay $10000</button>
		<button id="pl-context-Pay100000Button">Pay $100000</button>
	</div>
</div>
